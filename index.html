<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>立序代行公众号文章审稿预览</title>
  <style>
    body {
      margin: 0;
      background: #f7f8f5;
      color: #20242a;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
      line-height: 1.75;
    }
    main {
      width: min(760px, calc(100% - 32px));
      margin: 0 auto;
      padding: 42px 0 64px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 26px;
      line-height: 1.35;
    }
    p {
      margin: 0 0 18px;
      color: #68717d;
      font-size: 16px;
    }
    a {
      color: #147c63;
      text-decoration: none;
    }
    .item {
      display: block;
      margin: 18px 0 0;
      padding: 18px 20px;
      border: 1px solid #d9ded8;
      border-left: 4px solid #147c63;
      background: #ffffff;
    }
    .title {
      display: block;
      color: #20242a;
      font-size: 18px;
      font-weight: 800;
      line-height: 1.45;
    }
    .meta {
      display: block;
      margin-top: 6px;
      color: #7a8490;
      font-size: 13px;
      line-height: 1.6;
    }
    .status {
      display: inline-block;
      margin: 0 0 10px;
      padding: 3px 9px;
      border-radius: 999px;
      background: #e9f7f2;
      color: #147c63;
      font-size: 12px;
      font-weight: 800;
    }
  </style>
</head>
<body>
  <main>
    <h1>立序代行公众号文章审稿预览</h1>
    <p>这里是 GitHub Pages-ready 的公众号文章审稿入口。它只用于 Bob 审稿，不是公众号正式发布链接。</p>

    <a class="item" href="./wechat-005-freight-knowledge-base/">
      <span class="status">当前审稿中</span>
      <span class="title">第 5 篇：我只给 AI 三样东西，做出了一个货代知识库</span>
      <span class="meta">article_id: wechat-005-freight-knowledge-base / status: 当前审稿中 / copy-ready preview</span>
    </a>
  </main>
</body>
</html>
